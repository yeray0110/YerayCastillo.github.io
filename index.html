<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Special Webpage</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Background layers are kept outside the content so every section can swap its own mood. -->
  <div class="background-container" aria-hidden="true">
    <div id="background-pooh" class="background-layer background-pooh"></div>
    <div id="background-gradient" class="background-layer background-gradient"></div>
    <div id="playlist-background" class="background-layer playlist-background hidden"></div>
    <div id="anniversary-background" class="background-layer anniversary-background hidden"></div>
    <div id="board-background" class="background-layer board-background hidden"></div>
  </div>

  <main class="content">
    <section id="home-section" class="home-section">
      <h1 id="main-title" class="main-title">Welcome to your webpage, my love ❤️</h1>

      <nav id="main-buttons" class="menu-buttons" aria-label="Main sections">
        <button type="button" data-section="timer">Aniversary📅</button>
        <button type="button" data-section="versicle">Daily verse📕</button>
        <button type="button" data-section="playlist">Playlist🎶</button>
        <button type="button" data-section="directors">Board👩🏽‍❤️‍💋‍👨🏽</button>
        <button type="button" data-section="poems">Poems❤️</button>
      </nav>
    </section>

    <!-- Section HTML is loaded from /sections to keep this file clean. -->
    <div id="sections-root"></div>
  </main>

  <button id="menu" type="button" aria-label="Back to main menu">
    <img src="images/icon.png" alt="" class="menu-image">
  </button>

  <script src="js/app.js"></script>
</body>
</html>
